global:
  edition: ce
  hosts:
    domain: gitlab.local
    https: false
  ingress:
    enabled: false

  # Disable MinIO (object storage)
  minio:
    enabled: false

  # Explicitly disable all object storage types (prevents “connection can not be empty”)
  appConfig:
    object_store:
      enabled: false
    artifacts:
      enabled: false
    lfs:
      enabled: false
    uploads:
      enabled: false
    packages:
      enabled: false

# Chart still wants an email for issuer templates in some versions
certmanager-issuer:
  email: "iot@example.com"

# Disable components we don't need
nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: false

# Disable toolbox backups object storage requirement
gitlab:
  toolbox:
    backups:
      objectStorage:
        enabled: false
        config:
          secret: gitlab-backup-objectstorage
          key: config

  webservice:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  sidekiq:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  gitaly:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

postgresql:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
