apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: app3-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app3-html
  namespace: default
data:
  index.html: |
    <html>
    <head><title>App 3</title></head>
    <body>
      <h1>Hello from App 3!</h1>
      <p>This is the default app</p>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: app3-service
  namespace: default
spec:
  selector:
    app: app3
  ports:
  - port: 80
    targetPort: 80